<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParkEase Parking</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <!-- link for stylesheet -->
    <link rel="stylesheet" href="./css/style.css" />
    <!-- external link for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <!-- external link for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="login-section">
        <div class="login-header">
          <img src="./assets/parking-logo.png" alt="" class="login-logo" />
          <h1 class="text-blue line-h-3">
            <span class="text-yellow">ParkEase</span> parking
          </h1>
          <h3 class="text-blue">Sign in</h3>
        </div>
        <div class="form-container">
          <form action="./dashboard.html" class="login-form" id="login-form">
            <label for="" class="txt-muted">Username</label>
            <div class="input-grp">
              <input
                type="text"
                name="username"
                id="username"
                placeholder="Username"
                class="form-input"
              />
              <span class="login-icon"><i class="fas fa-user"></i></span>
            </div>
            <label for="" class="txt-muted">Password</label>
            <div class="input-grp">
              <input
                type="password"
                name="password"
                id="password"
                placeholder="********"
                class="form-input"
              /><span class="login-icon"><i class="fas fa-key"></i></span>
            </div>

            <button type="submit" class="login-btn">Login</button>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
